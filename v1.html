<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>The Coderoom — Senior Dev Mentorship</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Mono:ital,wght@0,400;0,500;1,400&family=Lora:ital@0;1&display=swap" rel="stylesheet"/>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0e0f13;
    --surface: #15171d;
    --card: #1c1f28;
    --border: #2a2d3a;
    --accent: #f5a623;
    --accent2: #4fc9a4;
    --accent3: #e05c7a;
    --text: #e8e6df;
    --muted: #6e7187;
    --raj: #f5a623;
    --you: #4fc9a4;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Lora', serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* grain overlay */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
    pointer-events: none;
    z-index: 999;
    opacity: 0.4;
  }

  header {
    padding: 3rem 2rem 2rem;
    text-align: center;
    border-bottom: 1px solid var(--border);
    background: linear-gradient(180deg, #1a1c24 0%, var(--bg) 100%);
  }

  .eyebrow {
    font-family: 'DM Mono', monospace;
    font-size: 0.72rem;
    letter-spacing: 0.2em;
    color: var(--accent);
    text-transform: uppercase;
    margin-bottom: 0.8rem;
  }

  header h1 {
    font-family: 'Syne', sans-serif;
    font-size: clamp(2rem, 5vw, 3.5rem);
    font-weight: 800;
    line-height: 1.1;
    background: linear-gradient(135deg, #f5a623, #e05c7a 60%, #a78bfa);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  header p {
    color: var(--muted);
    font-style: italic;
    margin-top: 0.8rem;
    font-size: 1rem;
  }

  .characters {
    display: flex;
    justify-content: center;
    gap: 2rem;
    margin-top: 1.5rem;
    flex-wrap: wrap;
  }

  .char-badge {
    display: flex;
    align-items: center;
    gap: 0.5rem;
    font-family: 'DM Mono', monospace;
    font-size: 0.8rem;
    padding: 0.4rem 0.9rem;
    border-radius: 2rem;
    border: 1px solid var(--border);
    background: var(--card);
  }

  .char-badge .dot {
    width: 8px; height: 8px;
    border-radius: 50%;
  }

  /* Nav */
  nav {
    display: flex;
    gap: 0.5rem;
    padding: 1.2rem 2rem;
    overflow-x: auto;
    border-bottom: 1px solid var(--border);
    background: var(--surface);
    scrollbar-width: none;
  }

  nav::-webkit-scrollbar { display: none; }

  .nav-btn {
    font-family: 'DM Mono', monospace;
    font-size: 0.72rem;
    letter-spacing: 0.05em;
    padding: 0.5rem 1rem;
    border-radius: 0.4rem;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--muted);
    cursor: pointer;
    white-space: nowrap;
    transition: all 0.2s;
  }

  .nav-btn:hover { color: var(--text); border-color: var(--accent); }
  .nav-btn.active {
    background: var(--accent);
    color: #000;
    border-color: var(--accent);
    font-weight: 500;
  }

  /* Main */
  main {
    max-width: 820px;
    margin: 0 auto;
    padding: 3rem 1.5rem 6rem;
  }

  .lesson { display: none; animation: fadeIn 0.4s ease; }
  .lesson.active { display: block; }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(12px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .lesson-header {
    margin-bottom: 2.5rem;
  }

  .lesson-tag {
    font-family: 'DM Mono', monospace;
    font-size: 0.7rem;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--accent2);
    margin-bottom: 0.6rem;
  }

  .lesson-title {
    font-family: 'Syne', sans-serif;
    font-size: clamp(1.5rem, 4vw, 2.2rem);
    font-weight: 800;
    color: var(--text);
  }

  .lesson-intro {
    margin-top: 0.8rem;
    color: var(--muted);
    font-style: italic;
    font-size: 0.95rem;
    line-height: 1.7;
  }

  /* Scene */
  .scene {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 1rem;
    padding: 2rem;
    margin-bottom: 1.5rem;
    position: relative;
    overflow: hidden;
  }

  .scene::before {
    content: '';
    position: absolute;
    top: 0; left: 0;
    width: 4px; height: 100%;
    background: var(--accent);
    border-radius: 1rem 0 0 1rem;
  }

  .scene.you-scene::before { background: var(--you); }
  .scene.note-scene::before { background: var(--accent3); }

  .speaker {
    font-family: 'DM Mono', monospace;
    font-size: 0.72rem;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    margin-bottom: 0.8rem;
    display: flex;
    align-items: center;
    gap: 0.5rem;
  }

  .speaker.raj { color: var(--raj); }
  .speaker.you { color: var(--you); }
  .speaker.note { color: var(--accent3); }

  .speaker::before {
    content: '';
    display: inline-block;
    width: 6px; height: 6px;
    border-radius: 50%;
    background: currentColor;
  }

  .dialogue {
    line-height: 1.85;
    font-size: 1rem;
    color: var(--text);
  }

  .dialogue em { color: var(--accent); font-style: normal; font-weight: 600; }
  .dialogue strong { color: var(--accent2); }

  /* Code block */
  .code-block {
    background: #0a0b0f;
    border: 1px solid var(--border);
    border-radius: 0.6rem;
    padding: 1.2rem 1.4rem;
    margin: 1rem 0;
    font-family: 'DM Mono', monospace;
    font-size: 0.82rem;
    line-height: 1.7;
    overflow-x: auto;
    color: #c9d1d9;
  }

  .code-block .cmt { color: #4e5566; font-style: italic; }
  .code-block .kw { color: #c792ea; }
  .code-block .fn { color: #82aaff; }
  .code-block .str { color: #c3e88d; }
  .code-block .num { color: #f78c6c; }
  .code-block .tag { color: #f07178; }
  .code-block .attr { color: #ffcb6b; }

  /* Analogy box */
  .analogy {
    background: linear-gradient(135deg, rgba(245,166,35,0.07), rgba(79,201,164,0.07));
    border: 1px solid rgba(245,166,35,0.2);
    border-radius: 0.7rem;
    padding: 1.2rem 1.4rem;
    margin: 1.2rem 0;
    font-size: 0.92rem;
    line-height: 1.75;
    color: #c9c4b8;
  }

  .analogy-label {
    font-family: 'DM Mono', monospace;
    font-size: 0.65rem;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--accent);
    margin-bottom: 0.5rem;
  }

  /* Summary */
  .summary-box {
    background: var(--surface);
    border: 1px solid var(--accent2);
    border-radius: 0.7rem;
    padding: 1.4rem;
    margin-top: 2rem;
  }

  .summary-box h4 {
    font-family: 'Syne', sans-serif;
    font-size: 0.85rem;
    font-weight: 700;
    color: var(--accent2);
    text-transform: uppercase;
    letter-spacing: 0.1em;
    margin-bottom: 0.8rem;
  }

  .summary-box ul {
    list-style: none;
    display: flex;
    flex-direction: column;
    gap: 0.5rem;
  }

  .summary-box li {
    font-family: 'DM Mono', monospace;
    font-size: 0.82rem;
    color: var(--text);
    padding-left: 1.2rem;
    position: relative;
  }

  .summary-box li::before {
    content: '→';
    position: absolute;
    left: 0;
    color: var(--accent2);
  }

  /* Progress */
  .progress-bar {
    height: 3px;
    background: var(--border);
    border-radius: 2px;
    margin-bottom: 2rem;
    overflow: hidden;
  }

  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
    border-radius: 2px;
    transition: width 0.4s ease;
  }

  /* Bottom nav */
  .bottom-nav {
    display: flex;
    justify-content: space-between;
    margin-top: 3rem;
    gap: 1rem;
  }

  .nav-arrow {
    font-family: 'DM Mono', monospace;
    font-size: 0.8rem;
    padding: 0.7rem 1.4rem;
    border-radius: 0.5rem;
    border: 1px solid var(--border);
    background: var(--card);
    color: var(--text);
    cursor: pointer;
    transition: all 0.2s;
    display: flex;
    align-items: center;
    gap: 0.5rem;
  }

  .nav-arrow:hover { border-color: var(--accent); color: var(--accent); }
  .nav-arrow:disabled { opacity: 0.3; cursor: not-allowed; }
  .nav-arrow.primary { background: var(--accent); color: #000; border-color: var(--accent); }
  .nav-arrow.primary:hover { opacity: 0.85; color: #000; }

  @media (max-width: 600px) {
    main { padding: 2rem 1rem 5rem; }
    .scene { padding: 1.3rem; }
  }
</style>
</head>
<body>

<header>
  <p class="eyebrow">The Coderoom Series</p>
  <h1>Senior Dev Mentorship</h1>
  <p>Real talk. Real code. Raj explains it all to you — the junior dev who just joined the team.</p>
  <div class="characters">
    <div class="char-badge"><span class="dot" style="background:#f5a623"></span> Raj — Senior Dev, 10 yrs</div>
    <div class="char-badge"><span class="dot" style="background:#4fc9a4"></span> You — Junior Dev, Day 1 back</div>
  </div>
</header>

<nav id="topNav"></nav>

<main>
  <div class="progress-bar"><div class="progress-fill" id="progressFill" style="width:10%"></div></div>
  <div id="lessons"></div>
  <div class="bottom-nav">
    <button class="nav-arrow" id="prevBtn" onclick="changeLesson(-1)" disabled>← Prev</button>
    <button class="nav-arrow primary" id="nextBtn" onclick="changeLesson(1)">Next →</button>
  </div>
</main>

<script>
const lessons = [
  {
    tag: "Git & Version Control",
    title: "The Time Machine You Never Knew You Had",
    intro: "It's your first day back. Raj pulls up a chair next to you.",
    scenes: [
      { speaker: "raj", text: `"So, you're back! Good. First thing — before you touch <em>any</em> code today, let's talk Git. Think of Git as a <strong>time machine for your code</strong>. Every time you make a save — we call it a <em>commit</em> — Git takes a snapshot of your entire project. If something breaks tomorrow, you can jump back to any snapshot."` },
      { speaker: "you", text: `"Okay, I know commits and branches. But what about merge vs rebase? I always confuse those."` },
      { speaker: "raj", text: `"Perfect. Imagine two train tracks that split apart and then need to come back together. <em>Merge</em> is like welding the two tracks together — it creates a new 'merge commit' that says 'hey, these two lines of work joined here.' <em>Rebase</em> is different — it picks up all your commits and replants them on top of the other branch, like you were working from there all along. It makes history look <strong>cleaner and linear</strong>."` },
      {
        type: "analogy",
        text: "Merge = two rivers joining and you can see where they met. Rebase = you pick up your work and pretend you started from where the other river already is."
      },
      { speaker: "raj", text: `"Now, stash. You're mid-feature, boss calls and says 'fix this bug NOW.' You're not ready to commit your half-done work. You run <em>git stash</em> — it's like sweeping your desk into a drawer. Your working directory goes clean, you fix the bug, and then you run <em>git stash pop</em> to get your stuff back out."` },
      {
        type: "code",
        text: `<span class="cmt"># You're in the middle of something...</span>\ngit stash          <span class="cmt"># sweep it away</span>\ngit checkout main  <span class="cmt"># fix the urgent bug</span>\ngit stash pop      <span class="cmt"># bring your work back</span>`
      },
      { speaker: "raj", text: `"And cherry-pick? Sometimes you merged a big feature branch but you only want ONE specific commit from it. Cherry-pick lets you grab exactly that commit and apply it to another branch. Like picking one donut from the box."` },
      {
        type: "summary",
        points: ["git stash = temporary drawer for unfinished work", "merge = join branches, keeps full history", "rebase = replay your commits on top of another branch, cleaner history", "cherry-pick = grab one specific commit and apply it elsewhere", "git fetch = download changes but DON'T apply them. git pull = fetch + merge in one shot"]
      }
    ]
  },
  {
    tag: "React",
    title: "Why Is the UI Slow? Let's Find Out",
    intro: "You've pushed a React component. Raj opens your code and raises an eyebrow.",
    scenes: [
      { speaker: "raj", text: `"This component re-renders every single time. See that function you're passing as a prop? Every render creates a brand new function. The child component sees a new reference, thinks something changed, and re-renders too. That's your lag."` },
      { speaker: "you", text: `"So... I should use useCallback?"` },
      { speaker: "raj", text: `"Exactly. <em>useCallback</em> memoizes the function itself. It says 'only give me a new function if these dependencies change.' <em>useMemo</em> does the same but for <strong>values</strong>, not functions. If you have a complex calculation — say, filtering a 10,000 item list — you wrap it in useMemo so it only recalculates when the list data actually changes."` },
      {
        type: "code",
        text: `<span class="cmt">// Without useCallback — new function every render</span>\n<span class="kw">const</span> <span class="fn">handleClick</span> = () => doSomething(id);\n\n<span class="cmt">// With useCallback — same function unless id changes</span>\n<span class="kw">const</span> <span class="fn">handleClick</span> = <span class="fn">useCallback</span>(() => doSomething(id), [id]);\n\n<span class="cmt">// useMemo for expensive value</span>\n<span class="kw">const</span> filtered = <span class="fn">useMemo</span>(() => bigList.filter(x => x.active), [bigList]);`
      },
      { speaker: "raj", text: `"Now the Virtual DOM. React doesn't touch the real browser DOM every render — that's slow. Instead it builds a <em>virtual copy in memory</em>, compares it to the previous version (this is called <strong>diffing</strong>), and only updates the parts that actually changed. It's like editing a Word doc by comparing two versions and only retyping the changed sentences."` },
      { speaker: "raj", text: `"For forms, forget writing your own state for every input. Use <em>React Hook Form</em> — it's performant because it doesn't re-render on every keystroke unlike controlled components. For global state, use <em>Context API</em> for simple stuff like theme or user info. Use <em>Redux</em> only when your state is complex, shared across many components, and needs time-travel debugging."` },
      {
        type: "analogy",
        text: "Context API = a shared noticeboard in the office (simple, everyone can read). Redux = a full filing system with a receptionist who controls all changes (powerful, but more setup)."
      },
      {
        type: "summary",
        points: ["Virtual DOM = fast in-memory comparison before touching real DOM", "useCallback = memoize functions so child components don't needlessly re-render", "useMemo = memoize expensive calculated values", "React Hook Form / Formik = handle forms without manual state for each field", "Context API for simple shared state, Redux for complex multi-component state", "Lazy loading = load components only when needed using React.lazy + Suspense"]
      }
    ]
  },
  {
    tag: "Node.js & Express",
    title: "Building the Engine Room",
    intro: "You're writing backend routes. Raj leans over and asks how you're handling auth.",
    scenes: [
      { speaker: "you", text: `"I was just going to store the user ID in a session..."` },
      { speaker: "raj", text: `"Sessions work, but for APIs — especially mobile or third-party clients — use <em>JWT (JSON Web Tokens)</em>. When a user logs in, the server signs a token with a secret key and sends it back. Every future request, the client sends that token in the header. The server just verifies the signature — <strong>no database lookup needed</strong>. It's stateless."` },
      {
        type: "analogy",
        text: "Session = stamp on your hand at the club (server has to check the list every time). JWT = a signed ticket with your details on it — the bouncer just reads and verifies the signature."
      },
      {
        type: "code",
        text: `<span class="cmt">// Signing a token on login</span>\n<span class="kw">const</span> token = jwt.<span class="fn">sign</span>({ userId: user._id }, <span class="str">'your-secret'</span>, { expiresIn: <span class="str">'7d'</span> });\n\n<span class="cmt">// Middleware to protect routes</span>\n<span class="kw">const</span> <span class="fn">authMiddleware</span> = (req, res, next) => {\n  <span class="kw">const</span> token = req.headers.authorization?.<span class="fn">split</span>(<span class="str">' '</span>)[<span class="num">1</span>];\n  <span class="kw">if</span> (!token) <span class="kw">return</span> res.<span class="fn">status</span>(<span class="num">401</span>).<span class="fn">json</span>({ error: <span class="str">'Unauthorized'</span> });\n  req.user = jwt.<span class="fn">verify</span>(token, <span class="str">'your-secret'</span>);\n  <span class="fn">next</span>();\n};`
      },
      { speaker: "raj", text: `"See that <em>next()</em> call? That's <strong>middleware</strong> in a nutshell. Middleware is just a function that sits between the request and your route handler. It can check auth, log stuff, parse the request body, handle errors. You can chain as many as you want. Express runs them in order."` },
      { speaker: "raj", text: `"For file uploads, use <em>Multer</em> — it's a middleware that handles multipart/form-data. It saves the file to disk or memory and sticks the info on req.file. For environment variables — never hardcode secrets in code. Use a <em>.env file</em> and the <em>dotenv</em> package. It loads them into process.env. And that .env file should always be in .gitignore."` },
      { speaker: "raj", text: `"The event loop — Node is single-threaded but handles thousands of requests. How? It delegates slow stuff like file reads and DB queries to the OS, moves on to other requests, and when the OS is done it gets a callback. If you write CPU-heavy synchronous code, you block the entire loop. That's why we always use async/await or callbacks for I/O."` },
      {
        type: "summary",
        points: ["JWT = stateless auth token, signed by server, sent by client on every request", "Middleware = functions in a chain between request and response — auth, logging, error handling", "Multer = middleware for handling file uploads", ".env + dotenv = keep secrets out of code", "Event loop = Node handles I/O concurrently by not waiting — never block it with heavy sync code"]
      }
    ]
  },
  {
    tag: "MongoDB",
    title: "The Database That Thinks in JSON",
    intro: "You're designing a data model. Raj asks how you're structuring the users and their orders.",
    scenes: [
      { speaker: "you", text: `"I was going to put the order IDs in an array on the user document..."` },
      { speaker: "raj", text: `"That's embedding a reference. You have two choices in Mongo — <em>embed</em> the data directly inside the document, or store a <strong>reference</strong> (like a foreign key) and use populate later. Embed when the data is small, always needed together, and doesn't change often — like a user's address. Reference when the related data is large, shared across documents, or queried on its own — like orders."` },
      {
        type: "analogy",
        text: "Embedding = stapling the receipt to the order form. Referencing = keeping receipts in a separate folder and writing 'see folder #42' on the form."
      },
      { speaker: "raj", text: `"Now, find() vs aggregate(). <em>find()</em> is your basic query — get me all users where age > 25. <em>aggregate()</em> is a pipeline — it's for when you need to <strong>transform, group, join, or calculate</strong>. Like 'give me total revenue per product category this month.' You couldn't do that with just find()."` },
      {
        type: "code",
        text: `<span class="cmt">// Simple find</span>\nUser.<span class="fn">find</span>({ age: { $gt: <span class="num">25</span> } })\n\n<span class="cmt">// Aggregate: total orders per user</span>\nOrder.<span class="fn">aggregate</span>([\n  { $<span class="fn">group</span>: { _id: <span class="str">"$userId"</span>, total: { $sum: <span class="str">"$amount"</span> } } },\n  { $<span class="fn">sort</span>: { total: <span class="num">-1</span> } }\n])\n\n<span class="cmt">// $lookup = like a JOIN in SQL</span>\n{ $<span class="fn">lookup</span>: { from: <span class="str">"products"</span>, localField: <span class="str">"productId"</span>, \n  foreignField: <span class="str">"_id"</span>, as: <span class="str">"product"</span> } }`
      },
      { speaker: "raj", text: `"<em>$lookup</em> is MongoDB's version of a SQL JOIN. Use it inside aggregate when you need to pull in data from another collection. Mongoose's <em>populate()</em> does the same thing but in application code — it's easier to write but does multiple queries under the hood. $lookup happens in one DB call. For performance on large datasets, prefer $lookup."` },
      { speaker: "raj", text: `"And indexes — without them, Mongo scans every single document to find what you need. With an index on the field you query most, it's like having a sorted index at the back of a book. Create indexes on fields you query, sort, or filter by often. Check slow queries with <em>.explain('executionStats')</em>."` },
      {
        type: "summary",
        points: ["Embed data when it's small and always used together. Reference when it's large or shared.", "find() = simple queries. aggregate() = transform, group, join, calculate", "$lookup = JOIN inside aggregate pipeline (one DB call)", "populate() = Mongoose convenience method (multiple DB calls)", "Always add indexes on frequently queried fields or Mongo does full collection scans"]
      }
    ]
  },
  {
    tag: "MySQL",
    title: "Tables, Joins, and Why ORDER Matters",
    intro: "Raj hands you a schema and asks you to write a query for the sales report.",
    scenes: [
      { speaker: "raj", text: `"The classic confusion — <em>WHERE</em> vs <em>HAVING</em>. Think of it this way: WHERE filters rows <strong>before</strong> grouping. HAVING filters groups <strong>after</strong> grouping. So if you want 'all orders where amount > 100', that's WHERE. But 'show me only customers who have placed more than 5 orders total' — that's HAVING because you're filtering on an aggregated count."` },
      {
        type: "code",
        text: `<span class="cmt">-- WHERE: filters individual rows</span>\n<span class="kw">SELECT</span> * <span class="kw">FROM</span> orders <span class="kw">WHERE</span> amount > <span class="num">100</span>;\n\n<span class="cmt">-- HAVING: filters on grouped results</span>\n<span class="kw">SELECT</span> customer_id, <span class="fn">COUNT</span>(*) <span class="kw">AS</span> total_orders\n<span class="kw">FROM</span> orders\n<span class="kw">GROUP BY</span> customer_id\n<span class="kw">HAVING</span> total_orders > <span class="num">5</span>;`
      },
      { speaker: "raj", text: `"JOINs. <em>INNER JOIN</em> — only rows that match on both sides. <em>LEFT JOIN</em> — all rows from the left table, and matching rows from the right. If there's no match on the right, you get NULLs. <em>RIGHT JOIN</em> is the opposite. Use LEFT JOIN most of the time when you want 'all customers, and their orders if any.'"` },
      {
        type: "analogy",
        text: "INNER JOIN = only people who are on BOTH the guest list AND RSVPed. LEFT JOIN = everyone on the guest list, and mark who RSVPed. If they didn't RSVP, the RSVP column is blank (NULL)."
      },
      { speaker: "raj", text: `"Indexes in MySQL work like a book index — instead of scanning every row, MySQL jumps straight to the relevant rows. Add indexes on columns you JOIN on, filter by in WHERE, or ORDER BY. But don't index everything — each index slows down INSERT and UPDATE slightly because MySQL has to update the index too."` },
      { speaker: "raj", text: `"Normalization — 1NF means no repeating groups, each cell has one value. 2NF means no partial dependencies (every column depends on the whole primary key, not just part of it). 3NF means no transitive dependencies — columns should depend only on the primary key, not on other non-key columns. Basically, <em>don't store the same data in two places</em>."` },
      { speaker: "raj", text: `"Stored procedures are precompiled SQL you save in the database and call by name. Think of it like a function. Useful when you want complex logic to run server-side without sending big queries over the network, or when multiple apps share the same database logic."` },
      {
        type: "summary",
        points: ["WHERE = filter before grouping. HAVING = filter after grouping (on aggregates)", "INNER JOIN = only matching rows. LEFT JOIN = all left rows + matched right (NULLs if no match)", "Indexes = fast lookups, but slow down writes — index what you query, not everything", "Normalization = organize tables to eliminate redundancy (1NF → 2NF → 3NF)", "Stored procedures = reusable SQL logic stored in the database, called like a function"]
      }
    ]
  },
  {
    tag: "Tools & Deployment",
    title: "Shipping It Without Breaking It",
    intro: "It's 4pm. You've got a working feature. Raj asks — 'How are you testing and deploying this?'",
    scenes: [
      { speaker: "you", text: `"I was just going to push to main and see what happens..."` },
      { speaker: "raj", text: `"Ha. No. We never push directly to main. But let's back up — <em>Postman</em> first. Before you even write frontend code, test your API endpoints in Postman. Set up an <strong>Environment</strong> — that's a set of variables like base URL and auth token. Then when you switch from local to staging to production, you just change the environment, not every request."` },
      { speaker: "raj", text: `"<em>CORS</em> — Cross-Origin Resource Sharing. When your React app on port 3000 calls your Express API on port 5000, the browser blocks it because they're different origins. On the server side, you use the <em>cors</em> npm package and whitelist your frontend URL. This is purely a browser security rule — Postman doesn't have this restriction, which is why your API works in Postman but fails in the browser."` },
      {
        type: "code",
        text: `<span class="cmt">// In your Express app</span>\n<span class="kw">const</span> cors = <span class="fn">require</span>(<span class="str">'cors'</span>);\napp.<span class="fn">use</span>(<span class="fn">cors</span>({\n  origin: <span class="str">'http://localhost:3000'</span>, <span class="cmt">// or your production frontend URL</span>\n  credentials: <span class="kw">true</span>\n}));`
      },
      { speaker: "raj", text: `"<em>Docker</em> — imagine you build the app, it works on your machine, then breaks on the server because the server has a different Node version. Docker packages your app <strong>with its entire environment</strong> into a container. Same container runs identically on your laptop, staging, and production. Docker Compose is for running multiple containers together — like your Node app + MongoDB + Redis all starting with one command."` },
      {
        type: "analogy",
        text: "Docker = shipping container. Your app and all its dependencies go inside the container. Every ship (server) receives the exact same container and runs it identically."
      },
      { speaker: "raj", text: `"For pagination — never send 10,000 records at once. Two approaches: <em>offset pagination</em> (page=2&limit=20 → SKIP 20 rows) or <em>cursor pagination</em> (after=lastId → more efficient for large datasets, no duplicate/missing records when data changes). For most cases, offset is fine. For feeds and infinite scroll, use cursor."` },
      { speaker: "raj", text: `"REST vs GraphQL — REST has fixed endpoints, each returns a fixed shape. GraphQL has one endpoint and the client specifies exactly what fields it wants. GraphQL shines when you have many different clients (mobile, web) needing different shapes of data. REST is simpler, more cacheable, and fine for most apps."` },
      {
        type: "summary",
        points: ["Postman Environments = variable sets for local/staging/production", "CORS = browser security rule; fix server-side with the cors npm package", "Docker = consistent environment packed with your app; no 'works on my machine'", "Docker Compose = spin up multiple services (app + DB + cache) with one command", "Pagination: offset (simple, page-based) vs cursor (efficient, for large/live data)", "REST = fixed endpoints, simple. GraphQL = flexible queries, one endpoint, better for varied clients"]
      }
    ]
  }
