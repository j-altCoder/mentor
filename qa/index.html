<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MERN Coding Prep</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>

<div class="layout">

  <aside class="sidebar">
    <div class="sidebar-head">
      <span class="app-title">MERN Prep</span>
      <button id="theme-btn" class="icon-btn" title="Toggle theme">
        <span id="theme-icon">&#9788;</span>
      </button>
    </div>

    <div class="sidebar-filters">
      <div class="filter-group">
        <button class="filter-btn active" data-filter="all">All</button>
        <button class="filter-btn" data-filter="JavaScript">JS</button>
        <button class="filter-btn" data-filter="React">React</button>
        <button class="filter-btn" data-filter="Express">Express</button>
        <button class="filter-btn" data-filter="MongoDB">Mongo</button>
        <button class="filter-btn" data-filter="Node.js">Node</button>
        <button class="filter-btn" data-filter="MySQL">MySQL</button>
      </div>
      <div class="filter-group">
        <button class="status-btn active" data-status="all">All</button>
        <button class="status-btn" data-status="unsolved">Unsolved</button>
        <button class="status-btn" data-status="solved">Solved</button>
      </div>
    </div>

    <nav id="q-list" class="q-list"></nav>

    <div class="sidebar-foot">
      <span id="progress-text" class="progress-text">0 / 10 solved</span>
      <div class="progress-track">
        <div id="progress-fill" class="progress-fill"></div>
      </div>
    </div>
  </aside>

  <section id="q-pane" class="q-pane"></section>

  <div id="resize-handle" class="resize-handle"></div>

  <section id="a-pane" class="a-pane">
    <div class="tab-bar" id="tab-bar">
      <button class="tab-btn active" data-tab="solution">Solution</button>
      <button class="tab-btn" data-tab="approach">Approach</button>
      <button class="tab-btn" data-tab="steps">Steps</button>
      <button class="tab-btn" data-tab="mistakes">Mistakes</button>
      <button class="tab-btn" data-tab="followup">Follow-up</button>
    </div>
    <div id="tab-content" class="tab-content"></div>
  </section>

</div>

<script src="questions.js"></script>
<script src="answers.js"></script>
<script src="app.js"></script>
</body>
</html>
